<!doctype html>
<html><head><meta charset="utf-8"><title>Logo lockups</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px; gap: 12px; }
  .row { gap: 12px; flex: 1; }
  .lockup {
    flex: 1;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    min-height: 200px;
  }
  .lockup img { max-width: 76%; height: auto; }
  .tag {
    position: absolute; left: 12px; bottom: 10px;
    font-family: var(--font-mono); font-size: 10px;
    padding: 3px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.7); color: var(--plum-800);
    backdrop-filter: blur(6px);
  }
  .tag.dark { background: rgba(74,27,59,0.6); color: var(--cream-100); }
</style>
</head>
<body>
  <div class="row">
    <div class="lockup" style="background: var(--cream-100); border: 1px solid var(--line);">
      <img src="../assets/plum-logo-full.png" alt="Plum logo">
      <span class="tag">primary · on cream</span>
    </div>
    <div class="lockup" style="background: var(--gradient-feng);">
      <img src="../assets/plum-logo-full.png" alt="Plum logo">
      <span class="tag">on brand gradient</span>
    </div>
    <div class="lockup" style="background: var(--plum-900);">
      <img src="../assets/plum-logo-full.png" alt="Plum logo" style="filter: brightness(0) saturate(100%) invert(94%) sepia(8%) saturate(287%) hue-rotate(295deg) brightness(98%) contrast(96%);">
      <span class="tag dark">cream-on-plum (KO)</span>
    </div>
  </div>
</body></html>
