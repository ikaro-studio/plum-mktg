<!doctype html>
<html><head><meta charset="utf-8"><title>Brand palette</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; flex: 1; }
  .swatch { min-height: 110px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch" style="background:#351B30;color:#F1EDEE">
      <div><div class="name">Plum 900</div><div class="role">deep ink</div></div>
      <div class="hex">#351B30</div>
    </div>
    <div class="swatch" style="background:#4A1B3B;color:#F1EDEE">
      <div><div class="name">Plum 800</div><div class="role">primary</div></div>
      <div class="hex">#4A1B3B</div>
    </div>
    <div class="swatch" style="background:#AA5476;color:#FFF">
      <div><div class="name">Rose 500</div><div class="role">accent</div></div>
      <div class="hex">#AA5476</div>
    </div>
    <div class="swatch" style="background:#C8A9AF;color:#4A1B3B">
      <div><div class="name">Rose 300</div><div class="role">dusty</div></div>
      <div class="hex">#C8A9AF</div>
    </div>
    <div class="swatch" style="background:#F8BC9F;color:#4A1B3B">
      <div><div class="name">Peach 400</div><div class="role">fire / joy</div></div>
      <div class="hex">#F8BC9F</div>
    </div>
    <div class="swatch" style="background:#C7D4BB;color:#4A1B3B">
      <div><div class="name">Sage 300</div><div class="role">earth</div></div>
      <div class="hex">#C7D4BB</div>
    </div>
    <div class="swatch" style="background:#F1EDEE;color:#4A1B3B;border:1px solid var(--line)">
      <div><div class="name">Cream 100</div><div class="role">surface</div></div>
      <div class="hex">#F1EDEE</div>
    </div>
  </div>
</body></html>
