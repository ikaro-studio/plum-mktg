<!doctype html>
<html><head><meta charset="utf-8"><title>Extended palette</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex: 1; }
  .swatch { min-height: 110px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch" style="background:#8EA1FF;color:#1B1B40">
      <div><div class="name">Iris 500</div><div class="role">rare highlight</div></div>
      <div class="hex">#8EA1FF</div>
    </div>
    <div class="swatch" style="background:#CCDEF6;color:#1B2A40">
      <div><div class="name">Iris 200</div><div class="role">pale ice</div></div>
      <div class="hex">#CCDEF6</div>
    </div>
    <div class="swatch" style="background:#2B4D59;color:#F1EDEE">
      <div><div class="name">Teal 700</div><div class="role">alt dark</div></div>
      <div class="hex">#2B4D59</div>
    </div>
    <div class="swatch" style="background:#49637A;color:#F1EDEE">
      <div><div class="name">Slate 500</div><div class="role">long-form alt</div></div>
      <div class="hex">#49637A</div>
    </div>
    <div class="swatch" style="background:#47575C;color:#F1EDEE">
      <div><div class="name">Slate 400</div><div class="role">muted graphite</div></div>
      <div class="hex">#47575C</div>
    </div>
  </div>
</body></html>
