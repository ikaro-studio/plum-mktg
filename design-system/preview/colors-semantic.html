<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic surfaces & text</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; gap: 10px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .surface {
    border-radius: var(--radius-md);
    padding: 18px;
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 130px;
  }
  .surface .row1 { font-family: var(--font-sans); font-weight: 600; font-size: 14px; }
  .surface .row2 { font-family: var(--font-sans); font-size: 13px; }
  .surface .row3 { font-family: var(--font-sans); font-size: 12px; }
  .surface .tok { font-family: var(--font-mono); font-size: 10px; opacity: 0.6; margin-top: auto; }
</style>
</head>
<body>
  <div class="grid">
    <div class="surface" style="background:var(--bg);">
      <div class="row1" style="color:var(--fg1)">Aa — primary text</div>
      <div class="row2" style="color:var(--fg2)">Aa — secondary text</div>
      <div class="row3" style="color:var(--fg3)">Aa — tertiary / meta</div>
      <div class="tok">--bg · --fg1 · --fg2 · --fg3</div>
    </div>
    <div class="surface" style="background:var(--bg-elevated);">
      <div class="row1" style="color:var(--fg1)">Aa — primary text</div>
      <div class="row2" style="color:var(--fg2)">Aa — secondary text</div>
      <div class="row3" style="color:var(--fg3)">Aa — tertiary</div>
      <div class="tok">--bg-elevated</div>
    </div>
    <div class="surface" style="background:var(--bg-sunken);">
      <div class="row1" style="color:var(--fg1)">Aa — primary text</div>
      <div class="row2" style="color:var(--fg2)">Aa — secondary</div>
      <div class="row3" style="color:var(--fg3)">Aa — tertiary</div>
      <div class="tok">--bg-sunken</div>
    </div>
    <div class="surface" style="background:var(--bg-inverse); border-color: transparent;">
      <div class="row1" style="color:var(--fg-inverse)">Aa — inverse text</div>
      <div class="row2" style="color:#C8A9AF">Aa — rose-on-plum</div>
      <div class="row3" style="color:#F8BC9F">Aa — peach accent</div>
      <div class="tok" style="color:#9B8189">--bg-inverse</div>
    </div>
  </div>
</body></html>
