<!doctype html>
<html><head><meta charset="utf-8"><title>Asset tile</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; justify-content: center; background: var(--cream-100); }
  .row { gap: 14px; align-items: stretch; }
  .asset {
    flex: 1; min-width: 0;
    background: var(--bg-elevated);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column;
    border: 1px solid var(--line);
  }
  .thumb {
    height: 160px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .info { padding: 12px 14px; display:flex; flex-direction: column; gap: 4px; }
  .nm { font-family: var(--font-sans); font-weight: 600; font-size: 13px; color: var(--plum-800); }
  .meta { font-family: var(--font-sans); font-size: 11px; color: var(--fg3); }
  .badge {
    position: absolute; top: 10px; left: 10px;
    font-family: var(--font-sans); font-weight: 600; font-size: 10px;
    padding: 3px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.85); color: var(--plum-800);
    backdrop-filter: blur(8px);
  }
  .star {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 999px;
    background: rgba(255,255,255,0.85);
    display:flex; align-items:center; justify-content:center;
    color: var(--rose-500);
  }
</style>
</head>
<body>
  <div class="row">
    <div class="asset">
      <div class="thumb" style="background: linear-gradient(135deg,#F8BC9F,#AA5476);">
        <span class="badge">v3.2</span>
        <span class="star">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </span>
      </div>
      <div class="info">
        <div class="nm">spring-campaign-hero.png</div>
        <div class="meta">image · 8.4 MB · 25 Jan</div>
      </div>
    </div>

    <div class="asset">
      <div class="thumb" style="background: var(--gradient-feng);">
        <span class="badge" style="background: var(--sage-300); color:#3B5028;">approved</span>
      </div>
      <div class="info">
        <div class="nm">brand-guidelines-v4.pdf</div>
        <div class="meta">document · 2.1 MB · 12 Jan</div>
      </div>
    </div>

    <div class="asset">
      <div class="thumb" style="background: #351B30;">
        <span class="badge" style="background:rgba(241,237,238,0.18); color: var(--cream-100);">live</span>
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#F1EDEE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 4 20 12 6 20 6 4" fill="#F1EDEE"></polygon></svg>
      </div>
      <div class="info">
        <div class="nm">manifesto-anthem.mp4</div>
        <div class="meta">video · 64 MB · 1:02</div>
      </div>
    </div>

    <div class="asset">
      <div class="thumb" style="background: var(--bg-sunken); border-bottom: 1px solid var(--line);">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#6B4A5C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h16"/></svg>
      </div>
      <div class="info">
        <div class="nm">type-tokens.json</div>
        <div class="meta">data · 3 KB · 02 Feb</div>
      </div>
    </div>
  </div>
</body></html>
