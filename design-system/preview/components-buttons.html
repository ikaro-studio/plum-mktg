<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; justify-content: center; }
  .specimen { padding: 18px 22px; gap: 14px; display: flex; flex-direction: column; }
  .row { gap: 12px; align-items: center; flex-wrap: wrap; }
  button {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.32, 0.72, 0.24, 1.0);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .primary    { background: var(--plum-800); color: var(--cream-100); }
  .primary:hover { background: var(--plum-700); box-shadow: var(--shadow-md); }
  .secondary  { background: var(--cream-100); color: var(--plum-800); border-color: var(--line-strong); }
  .secondary:hover { background: var(--bg-sunken); }
  .accent     { background: var(--rose-500); color: #FFF; }
  .accent:hover { background: #95416A; }
  .ghost      { background: transparent; color: var(--plum-800); }
  .ghost:hover { background: rgba(74,27,59,0.06); }
  .danger     { background: transparent; color: var(--danger); border-color: rgba(177,69,69,0.4); }
  .danger:hover { background: rgba(177,69,69,0.08); }
  .icon-btn {
    width: 36px; height: 36px; padding: 0; justify-content: center;
    background: transparent; color: var(--fg2);
  }
  .icon-btn:hover { background: rgba(74,27,59,0.08); color: var(--fg1); }
  .pressed { background: var(--plum-900); transform: scale(0.98); box-shadow: var(--shadow-xs); }
  .focused { box-shadow: 0 0 0 4px rgba(248, 188, 159, 0.55); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); width: 78px; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="row">
      <span class="lbl">primary</span>
      <button class="primary">Upload assets</button>
      <button class="primary" style="background:var(--plum-700); box-shadow: var(--shadow-md);">hover</button>
      <button class="primary pressed">pressed</button>
      <button class="primary focused">focused</button>
    </div>
    <div class="row">
      <span class="lbl">accent</span>
      <button class="accent">Share collection</button>
      <span class="lbl">secondary</span>
      <button class="secondary">Cancel</button>
      <span class="lbl">ghost</span>
      <button class="ghost">Skip</button>
      <span class="lbl">danger</span>
      <button class="danger">Remove</button>
    </div>
  </div>
</body></html>
