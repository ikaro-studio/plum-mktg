<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; justify-content: center; }
  .specimen { padding: 18px 22px; gap: 12px; display: flex; flex-direction: column; }
  .row { gap: 12px; align-items: center; }
  .field {
    display: flex; flex-direction: column; gap: 4px; flex: 1;
  }
  .field label { font-family: var(--font-sans); font-size: 12px; color: var(--fg2); font-weight: 500; }
  .input {
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--line-strong);
    background: var(--bg-elevated);
    color: var(--fg1);
  }
  .input::placeholder { color: var(--fg3); }
  .input.focused {
    border-color: var(--rose-500);
    box-shadow: 0 0 0 4px rgba(248, 188, 159, 0.55);
    outline: none;
  }
  .input.error {
    border-color: var(--danger);
  }
  .err { font-family: var(--font-sans); font-size: 11px; color: var(--danger); }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elevated); border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 14px; flex: 1;
  }
  .search svg { color: var(--fg3); }
  .search input { border: 0; outline: 0; flex: 1; background: transparent; font-family: var(--font-sans); font-size: 14px; color: var(--fg1); }
  .kbd { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); border: 1px solid var(--line); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="row">
      <div class="field">
        <label>Brand name</label>
        <input class="input" value="Plum Co." />
      </div>
      <div class="field">
        <label>Workspace URL</label>
        <input class="input focused" value="plum-co.plum.app" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Collection slug</label>
        <input class="input error" value="brand-/-launch" />
        <span class="err">Slugs may not contain slashes.</span>
      </div>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input placeholder="Search assets, collections, brands…" />
        <span class="kbd">⌘ K</span>
      </div>
    </div>
  </div>
</body></html>
