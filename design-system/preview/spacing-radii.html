<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; justify-content: center; }
  .row { gap: 14px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .box { width: 84px; height: 84px; background: var(--plum-800); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .nm  { font-family: var(--font-sans); font-size: 11px; color: var(--fg1); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">xs</div><div class="lbl">4 px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="nm">sm</div><div class="lbl">8 px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="nm">md</div><div class="lbl">12 px</div></div>
    <div class="item"><div class="box" style="border-radius:18px"></div><div class="nm">lg</div><div class="lbl">18 px</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="nm">xl</div><div class="lbl">24 px</div></div>
    <div class="item"><div class="box" style="border-radius:32px"></div><div class="nm">2xl</div><div class="lbl">32 px</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:84px"></div><div class="nm">full</div><div class="lbl">999 px</div></div>
  </div>
</body></html>
