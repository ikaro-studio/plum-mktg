<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; justify-content: center; gap: 8px; }
  .row { gap: 16px; align-items: center; }
  .item { display: flex; align-items: center; gap: 10px; }
  .bar { background: var(--peach-400); height: 16px; border-radius: 4px; }
  .nm  { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); width: 64px; }
  .ex  { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="col" style="gap: 6px">
    <div class="item"><div class="nm">--space-1</div><div class="bar" style="width:4px"></div><div class="ex">4 · hairline gap</div></div>
    <div class="item"><div class="nm">--space-2</div><div class="bar" style="width:8px"></div><div class="ex">8 · inline gap</div></div>
    <div class="item"><div class="nm">--space-3</div><div class="bar" style="width:12px"></div><div class="ex">12 · chip padding</div></div>
    <div class="item"><div class="nm">--space-4</div><div class="bar" style="width:16px"></div><div class="ex">16 · button x-padding</div></div>
    <div class="item"><div class="nm">--space-6</div><div class="bar" style="width:24px"></div><div class="ex">24 · card padding</div></div>
    <div class="item"><div class="nm">--space-8</div><div class="bar" style="width:32px"></div><div class="ex">32 · section gap</div></div>
    <div class="item"><div class="nm">--space-12</div><div class="bar" style="width:48px"></div><div class="ex">48 · page padding desktop</div></div>
    <div class="item"><div class="nm">--space-20</div><div class="bar" style="width:80px"></div><div class="ex">80 · hero rhythm</div></div>
  </div>
</body></html>
