<!doctype html>
<html><head><meta charset="utf-8"><title>Shadow / elevation</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; justify-content: center; background: var(--cream-100); }
  .row { gap: 28px; align-items: center; justify-content: space-around; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .card {
    width: 110px; height: 110px;
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
  }
  .xs  { box-shadow: 0 1px 2px rgba(74, 27, 59, 0.06); }
  .sm  { box-shadow: 0 2px 8px rgba(74, 27, 59, 0.06), 0 1px 2px rgba(74, 27, 59, 0.04); }
  .md  { box-shadow: 0 8px 24px -8px rgba(74, 27, 59, 0.16), 0 2px 6px rgba(74, 27, 59, 0.05); }
  .lg  { box-shadow: 0 24px 56px -20px rgba(74, 27, 59, 0.28), 0 6px 12px rgba(74, 27, 59, 0.06); }
  .focus {
    box-shadow: 0 0 0 4px rgba(248, 188, 159, 0.55);
    border: 1px solid var(--rose-500);
  }
  .nm { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--fg1); }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="card xs"></div><div class="nm">shadow-xs</div><div class="lbl">hairline lift</div></div>
    <div class="item"><div class="card sm"></div><div class="nm">shadow-sm</div><div class="lbl">resting card</div></div>
    <div class="item"><div class="card md"></div><div class="nm">shadow-md</div><div class="lbl">hover · menu</div></div>
    <div class="item"><div class="card lg"></div><div class="nm">shadow-lg</div><div class="lbl">modal · popover</div></div>
    <div class="item"><div class="card focus"></div><div class="nm">shadow-focus</div><div class="lbl">peach focus ring</div></div>
  </div>
</body></html>
