<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow & phrase</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; justify-content: center; }
  .specimen { padding: 22px 28px; gap: 18px; display: flex; flex-direction: column; }
  .eyebrow { font-family: var(--font-sans); font-weight: 700; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg2); }
  .phrase-row { display: flex; gap: 28px; flex-wrap: wrap; align-items: baseline; }
  .phrase { font-family: var(--font-soft), "Quicksand", sans-serif; font-weight: 300; font-size: 36px; line-height: 1.0; color: var(--plum-800); }
  .meta { color: var(--fg3); }
</style>
</head>
<body>
  <div class="specimen">
    <div>
      <div class="eyebrow">Spirit · Specialty · How we stand out</div>
      <div class="meta">.eyebrow — Sora 700 · 13/13 · tracking 0.12em · uppercase</div>
    </div>
    <div>
      <div class="phrase-row">
        <span class="phrase">helpful</span>
        <span class="phrase">balance</span>
        <span class="phrase">inviting</span>
        <span class="phrase">warm</span>
        <span class="phrase">harmonious</span>
      </div>
      <div class="meta">.phrase — Quicksand 300 · 36/41 · lowercase only · subs Isidora Light</div>
    </div>
  </div>
</body></html>
