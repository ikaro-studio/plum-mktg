<!doctype html>
<html><head><meta charset="utf-8"><title>Heading scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; justify-content: center; gap: 8px; }
  .specimen { padding: 18px 26px; gap: 8px; display: flex; flex-direction: column; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); width: 80px; flex-shrink: 0; }
  h2,h3,h4,h5 { color: var(--plum-800); margin: 0; }
  h2 { font-family: var(--font-sans); font-weight: 700; font-size: 48px; line-height: 1.05; letter-spacing: -0.04em; }
  h3 { font-family: var(--font-sans); font-weight: 600; font-size: 32px; line-height: 1.15; letter-spacing: -0.02em; }
  h4 { font-family: var(--font-sans); font-weight: 600; font-size: 24px; line-height: 1.15; letter-spacing: -0.02em; }
  h5 { font-family: var(--font-sans); font-weight: 600; font-size: 18px; line-height: 1.2; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="line"><span class="label">h2 · 48/52</span><h2>The brand library, intact.</h2></div>
    <div class="line"><span class="label">h3 · 32/36</span><h3>Collections that bloom on their own.</h3></div>
    <div class="line"><span class="label">h4 · 24/28</span><h4>Recently added assets</h4></div>
    <div class="line"><span class="label">h5 · 18/22</span><h5>Versioning &amp; provenance</h5></div>
  </div>
</body></html>
