<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; justify-content: center; }
  .specimen { padding: 18px 24px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-sans); color: var(--plum-800); }
  td { padding: 6px 0; border-bottom: 1px solid var(--line); vertical-align: baseline; }
  td.size { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); width: 80px; }
  td.token { font-family: var(--font-mono); font-size: 10px; color: var(--rose-500); width: 80px; text-align: right; }
  .s12 { font-size: 12px; line-height: 1.4; }
  .s14 { font-size: 14px; }
  .s16 { font-size: 16px; }
  .s20 { font-size: 20px; }
  .s24 { font-size: 24px; line-height: 1.15; letter-spacing:-0.02em }
  .s32 { font-size: 32px; line-height: 1.05; letter-spacing:-0.03em; font-weight:600 }
</style>
</head>
<body>
  <div class="specimen">
    <table>
      <tr><td class="size">12</td><td class="s12">The plum blooms first.</td><td class="token">--fs-12</td></tr>
      <tr><td class="size">14</td><td class="s14">The plum blooms first.</td><td class="token">--fs-14</td></tr>
      <tr><td class="size">16</td><td class="s16">The plum blooms first.</td><td class="token">--fs-16</td></tr>
      <tr><td class="size">20</td><td class="s20">The plum blooms first.</td><td class="token">--fs-20</td></tr>
      <tr><td class="size">24</td><td class="s24">The plum blooms first.</td><td class="token">--fs-24</td></tr>
      <tr><td class="size">32</td><td class="s32">The plum blooms first.</td><td class="token">--fs-32</td></tr>
    </table>
  </div>
</body></html>
